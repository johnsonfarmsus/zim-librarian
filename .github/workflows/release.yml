name: Release desktop apps
# Builds unsigned installers on tag push (v*). Add signing secrets before
# public distribution: APPLE_CERTIFICATE / WINDOWS_CERTIFICATE etc.
on:
  push:
    tags: ["v*"]

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Fetch bundled model (OLMo 2 1B)
        shell: bash
        run: sh scripts/fetch-model.sh
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/app-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "ZIM Librarian ${{ github.ref_name }}"
          releaseDraft: true
